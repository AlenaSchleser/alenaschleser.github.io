<!DOCTYPE html>
<html>
<head>
  <title>Mein Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3e8ff; /* Flieder hell */
      color: #2b2b2b;
      text-align: center;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e9d5ff, #f3e8ff);
    }

    img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 4px solid white;
    }

    button {
      background: #c084fc;
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #a855f7;
    }

    section {
      padding: 60px 20px;
      background: white;
    }

  </style>
</head>

<body>

<header>
  <!-- Bild einfügen -->
  <img src="dein-bild.jpg" alt="Mein Bild">

  <!-- Button Name -->
  <button onclick="document.getElementById('portfolio').scrollIntoView({behavior:'smooth'})">
    Alena
  </button>

  <p>Willkommen auf meinem Portfolio</p>
</header>

<section id="portfolio">
  <h2>Mein Portfolio</h2>
  <p>Hier zeige ich meine Projekte im Bereich E-Commerce.</p>
</section>

</body>
</html>
